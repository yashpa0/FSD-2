name: Fullstack Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:

  backend-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Testing/Backend

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - run: |
          source venv/bin/activate
          pytest


  frontend-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Testing/Frontend

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 20

      - run: npm install
      - run: npm run test
